name: Deploy piskid-lp

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.WIKOLABS_VM_SSH_KEY }}
          VM_HOST: ${{ secrets.WIKOLABS_VM_HOST }}
          VM_USER: ${{ secrets.WIKOLABS_VM_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$VM_USER@$VM_HOST" "set -e; [ ! -d /opt/piskid-lp/.git ] && git clone https://github.com/Wikolabs/piskid-lp.git /opt/piskid-lp; cd /opt/piskid-lp && git pull origin main && docker build -t piskid-lp:local . && (docker stop piskid-lp 2>/dev/null; docker rm piskid-lp 2>/dev/null; true) && docker run -d --name piskid-lp -p 3053:3000 --restart unless-stopped piskid-lp:local && echo 'Deployed piskid-lp on port 3053'"
