name: Deploy patrimai

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy to VM via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.WIKOLABS_VM_SSH_KEY }}
          VM_HOST: ${{ secrets.WIKOLABS_VM_HOST }}
          VM_USER: ${{ secrets.WIKOLABS_VM_USER }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=30 "$VM_USER@$VM_HOST" "set -e; if [ -d /opt/patrimai/.git ]; then cd /opt/patrimai && git remote set-url origin https://github.com/Wikolabs/patrimai-lp.git && git fetch origin main && git reset --hard origin/main; else git clone https://github.com/Wikolabs/patrimai-lp.git /opt/patrimai && cd /opt/patrimai; fi && docker build -t patrimai:local . && docker rm -f patrimai 2>/dev/null || true && docker run -d --name patrimai -p 3058:3000 -e GROQ_API_KEY='$GROQ_API_KEY' -e GEMINI_API_KEY='$GEMINI_API_KEY' --restart unless-stopped patrimai:local && echo 'Deployed patrimai on port 3058'"
